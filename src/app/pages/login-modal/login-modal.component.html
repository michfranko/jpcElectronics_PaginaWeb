<div class="modal modal-open backdrop-blur-sm bg-slate-900/60 transition-all duration-500" (click)="closeModal($event)">
  <div class="modal-box max-w-md bg-white rounded-[2.5rem] shadow-2xl p-0 overflow-hidden border border-white/20 animate-in fade-in zoom-in duration-300" (click)="stopPropagation($event)">

    <div class="bg-primary p-8 text-center relative overflow-hidden">
      <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.webp')]"></div>
      <div class="relative z-10">
        <h2 class="text-3xl font-black text-white uppercase tracking-tighter">Acceso Privado</h2>
        <p class="text-blue-100 text-xs font-bold uppercase tracking-widest mt-2 opacity-80">JPC Electronics S.A.</p>
      </div>
    </div>

    <form (ngSubmit)="login()" class="p-10 space-y-6">
      <div class="form-control">
        <label class="label font-black text-[10px] uppercase text-slate-400 tracking-widest">Identificación</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30 text-xl">👤</span>
          <input type="email" [(ngModel)]="email" name="email" placeholder="usuario@jpc.com" required
                 class="input input-bordered input-primary w-full pl-12 bg-slate-50 font-bold focus:ring-4 focus:ring-primary/10 transition-all" />
        </div>
      </div>

      <div class="form-control">
        <label class="label font-black text-[10px] uppercase text-slate-400 tracking-widest">Credencial de Seguridad</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30 text-xl">🔑</span>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required
                 class="input input-bordered input-primary w-full pl-12 bg-slate-50 font-bold focus:ring-4 focus:ring-primary/10 transition-all" />
        </div>
      </div>

      <div class="pt-4 flex flex-col gap-3">
        <button type="submit" class="btn btn-primary w-full rounded-2xl h-14 text-lg font-black shadow-lg shadow-blue-200 uppercase tracking-tighter hover:scale-[1.02] active:scale-95 transition-all">
          Autenticar Sistema
        </button>
        <button type="button" (click)="close.emit()" class="btn btn-ghost btn-sm text-slate-400 font-bold italic lowercase hover:bg-transparent">
          Cerrar ventana
        </button>
      </div>
    </form>

    <div class="bg-slate-50 px-10 py-4 border-t border-slate-100 flex justify-center">
      <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">Authorized Personnel Only</p>
    </div>
  </div>
</div>
